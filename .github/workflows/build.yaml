name: Container Build

on:
  push:
    branches: main
    paths:
      - .gihub/workflows/build.yaml
      - Dockerfile
      - app.py
      - src/**
      - .dockerignore
      - pyproject.toml
      - poetry.lock

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: false
          tags: azure-account-show:latest,azure-account-show:main
            
